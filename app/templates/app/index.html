{% extends 'base.html' %}
{% load static %}

{% block title %} Главарь страница {% endblock %}

{% block content %}
    <div class="products">
        {% for product in products %}
        <div class="product-card">
            <h2>{{ product.title }}</h2>
            <p>{{ product.cost }}</p>
            <p>{{ product.description }}</p>
            <p>{{ product.category }}</p>
            <img src="{{ product.image_url }}" alt="{{ product.title }}">
        {% endfor %}
    </div>
{% endblock %}
